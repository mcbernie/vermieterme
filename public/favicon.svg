<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg32" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b91c1c"/>
      <stop offset="100%" style="stop-color:#7f1d1d"/>
    </linearGradient>
  </defs>

  <!-- Hintergrund -->
  <rect width="32" height="32" rx="6" fill="url(#bg32)"/>

  <!-- Haus (pixeloptimiert für 32px) -->
  <!-- Dach -->
  <polygon points="4,15 16,5 28,15" fill="white" opacity="0.95"/>
  <!-- Körper -->
  <rect x="6" y="14" width="20" height="14" fill="white" opacity="0.95" rx="1"/>
  <!-- Tür -->
  <rect x="13" y="20" width="6" height="8" fill="#b91c1c" rx="1"/>
  <!-- Fenster links -->
  <rect x="8" y="17" width="4" height="4" fill="#b91c1c" rx="0.5" opacity="0.3"/>
  <rect x="8" y="17" width="4" height="4" fill="none" stroke="#b91c1c" stroke-width="0.8" rx="0.5"/>
  <!-- Fenster rechts -->
  <rect x="20" y="17" width="4" height="4" fill="#b91c1c" rx="0.5" opacity="0.3"/>
  <rect x="20" y="17" width="4" height="4" fill="none" stroke="#b91c1c" stroke-width="0.8" rx="0.5"/>
  <!-- Euro auf Schornstein-Badge -->
  <circle cx="24" cy="10" r="5" fill="#7f1d1d" stroke="white" stroke-width="1"/>
  <text x="24" y="13.5" text-anchor="middle" font-family="Georgia, serif" font-size="6" font-weight="bold" fill="white">€</text>
</svg>
